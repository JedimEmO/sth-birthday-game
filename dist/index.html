DjnkkEMOOeSQQw455JBDDjnkkEMOOeSQQw455JBDDrkm+f8B+Czbq2rMJtgAAAAASUVORK5CYII=";var Ac=document.querySelector("#app");if(!Ac)throw new Error("Missing #app root");var Mg=`
  :root {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff8dc;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  #hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    color: #fff8dc;
    text-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
  }

  .topbar {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: max(14px, env(safe-area-inset-left));
    right: max(14px, env(safe-area-inset-right));
    display: grid;
    grid-template-columns: minmax(190px, 320px) 1fr auto;
    gap: 12px;
    align-items: start;
  }

  .panel {
    background: rgba(24, 22, 29, 0.76);
    border: 1px solid rgba(255, 231, 148, 0.28);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
    backdrop-filter: blur(10px);
  }

  .healthPanel {
    padding: 10px;
    border-radius: 8px;
  }

  .meter {
    height: 16px;
    border-radius: 5px;
    overflow: hidden;
    background: #301f2a;
    border: 1px solid rgba(255, 255, 255, 0.16);
  }

  .meterFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ed4f63, #ffd166);
    transition: width 120ms ease;
  }

  .stats {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-top: 8px;
    font-size: 12px;
    letter-spacing: 0;
    color: #f6e7b1;
  }

  .roomPanel {
    justify-self: center;
    max-width: min(430px, 48vw);
    padding: 10px 14px;
    border-radius: 8px;
    text-align: center;
  }

  .roomName {
    font-size: clamp(16px, 2.2vw, 24px);
    font-weight: 800;
    line-height: 1.05;
  }

  .roomSub {
    margin-top: 4px;
    font-size: 12px;
    color: #d7e7ff;
  }

  .cooldowns {
    justify-self: end;
    display: flex;
    gap: 8px;
  }

  .chip {
    min-width: 68px;
    padding: 9px 10px;
    border-radius: 8px;
    text-align: center;
    font-size: 12px;
    color: #f9eab8;
  }

  .chip b {
    display: block;
    font-size: 15px;
    color: #ffffff;
  }

  #centerOverlay {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    padding: 22px;
  }

  .modal {
    pointer-events: auto;
    width: min(720px, calc(100vw - 32px));
    border-radius: 8px;
    padding: clamp(18px, 4vw, 34px);
    text-align: center;
  }

  .title {
    margin: 0;
    font-size: clamp(34px, 7vw, 72px);
    line-height: 0.92;
    letter-spacing: 0;
  }

  .tagline {
    margin: 12px auto 0;
    max-width: 560px;
    color: #e4eeff;
    font-size: clamp(14px, 2vw, 18px);
  }

  .actions {
    margin-top: 22px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    appearance: none;
    border: 0;
    border-radius: 8px;
    background: #ffd166;
    color: #211518;
    font: inherit;
    font-weight: 850;
    padding: 12px 16px;
    cursor: pointer;
    box-shadow: 0 5px 0 #a86325, 0 14px 28px rgba(0, 0, 0, 0.22);
  }

  button:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #a86325, 0 8px 18px rgba(0, 0, 0, 0.2);
  }

  .boonGrid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 20px;
  }

  .boonButton {
    min-height: 146px;
    padding: 16px 14px;
    background: #251d30;
    color: #fff7d1;
    border: 1px solid rgba(255, 219, 112, 0.42);
    box-shadow: 0 5px 0 #6e3c73, 0 16px 24px rgba(0, 0, 0, 0.22);
    text-align: left;
  }

  .boonButton strong {
    display: block;
    margin-bottom: 8px;
    color: #ffd166;
    font-size: 17px;
    line-height: 1.1;
  }

  .boonButton span {
    color: #d7e7ff;
    font-size: 13px;
    line-height: 1.35;
  }

  #touchControls {
    position: fixed;
    inset: auto 0 max(18px, env(safe-area-inset-bottom)) 0;
    display: none;
    pointer-events: none;
    padding: 0 max(18px, env(safe-area-inset-right)) 0 max(18px, env(safe-area-inset-left));
    justify-content: space-between;
    align-items: end;
  }

  #stick {
    pointer-events: auto;
    width: 128px;
    height: 128px;
    border-radius: 50%;
    border: 1px solid rgba(255, 240, 170, 0.28);
    background: rgba(20, 18, 28, 0.58);
    position: relative;
    touch-action: none;
  }

  #knob {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #ffd166;
    border: 3px solid #fff6c6;
    position: absolute;
    left: 38px;
    top: 38px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
  }

  .touchButtons {
    pointer-events: auto;
    display: grid;
    grid-template-columns: repeat(2, 74px);
    gap: 9px;
  }

  .touchButtons button {
    min-height: 58px;
    padding: 9px;
    font-size: 13px;
  }

  .touchButtons button:first-child {
    grid-column: span 2;
  }

  @media (pointer: coarse), (max-width: 760px) {
    #touchControls {
      display: flex;
    }

    .topbar {
